<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>منصة حسام التعليمية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Cairo',sans-serif;direction:rtl;background:#F0F4FF;-webkit-tap-highlight-color:transparent}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:#F5A623;border-radius:2px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn 0.3s ease}
  button{font-family:'Cairo',sans-serif}
  input{font-family:'Cairo',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const C={navy:"#0F1B3D",navyLight:"#1A2F5E",gold:"#F5A623",goldLight:"#FFD580",green:"#27AE60",red:"#E74C3C",bg:"#F0F4FF",card:"#FFFFFF",text:"#1A1A2E",muted:"#6B7280",border:"#E2E8F0"};
const ADMIN_PASS="husam2025";
const initialData={
  pdfs:[
    {id:1,title:"ملخص الجبر التجريدي - الوحدة الأولى",subject:"جبر تجريدي",date:"2025-06-01",url:"#",size:"2.3 MB"},
    {id:2,title:"محاضرات نظرية البيان الكاملة",subject:"نظرية البيان",date:"2025-05-20",url:"#",size:"4.1 MB"},
    {id:3,title:"ملخص الرياضيات المتقطعة",subject:"رياضيات متقطعة",date:"2025-05-15",url:"#",size:"1.8 MB"},
  ],
  freeVideos:[
    {id:1,title:"شرح مفهوم الزمر - مقدمة شاملة",subject:"جبر تجريدي",duration:"24 دقيقة",thumb:"https://placehold.co/320x180/0F1B3D/F5A623?text=جبر+تجريدي",url:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
    {id:2,title:"خوارزمية بحث DFS بالتفصيل",subject:"نظرية البيان",duration:"18 دقيقة",thumb:"https://placehold.co/320x180/0F1B3D/F5A623?text=نظرية+البيان",url:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
    {id:3,title:"حل أسئلة الميكانيك - الفصل الأول",subject:"ميكانيك",duration:"31 دقيقة",thumb:"https://placehold.co/320x180/0F1B3D/F5A623?text=ميكانيك",url:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
  ],
  paidVideos:[
    {id:1,title:"سلسلة الجبر التجريدي الكاملة - 12 محاضرة",subject:"جبر تجريدي",price:1500,duration:"6 ساعات",thumb:"https://placehold.co/320x180/0F1B3D/FFD580?text=دورة+كاملة",url:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
    {id:2,title:"بنك أسئلة نهائي مع الحلول",subject:"رياضيات متقطعة",price:800,duration:"3 ساعات",thumb:"https://placehold.co/320x180/0F1B3D/FFD580?text=بنك+أسئلة",url:"https://www.youtube.com/embed/dQw4w9WgXcQ"},
  ],
};

function Badge({text,color=C.gold}){return <span style={{background:color+"22",color,fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,border:`1px solid ${color}44`}}>{text}</span>}

function Header({tab,isAdmin,onAdminToggle}){
  const labels={home:"الرئيسية",pdfs:"الملفات",freeVideos:"شروحات مجانية",paidVideos:"شروحات مدفوعة",admin:"الإدارة"};
  return <div style={{background:`linear-gradient(135deg,${C.navy} 0%,${C.navyLight} 100%)`,padding:"16px 20px 12px",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,0.3)"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{color:C.gold,fontSize:11,fontWeight:700,letterSpacing:1}}>منصة حسام التعليمية</div>
        <div style={{color:"#fff",fontSize:18,fontWeight:900,marginTop:2}}>{labels[tab]||"الرئيسية"}</div>
      </div>
      <button onClick={onAdminToggle} style={{background:isAdmin?C.gold:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,padding:"6px 12px",color:isAdmin?C.navy:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
        {isAdmin?"⚙️ مدير":"🔐 دخول"}
      </button>
    </div>
  </div>;
}

function BottomNav({tab,setTab,isAdmin}){
  const tabs=[{id:"home",icon:"🏠",label:"الرئيسية"},{id:"pdfs",icon:"📄",label:"الملفات"},{id:"freeVideos",icon:"▶️",label:"مجاني"},{id:"paidVideos",icon:"🔒",label:"مدفوع"}];
  if(isAdmin)tabs.push({id:"admin",icon:"⚙️",label:"إدارة"});
  return <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.navy,display:"flex",borderTop:`2px solid ${C.gold}44`,zIndex:100}}>
    {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",padding:"10px 4px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,borderTop:tab===t.id?`3px solid ${C.gold}`:"3px solid transparent"}}>
      <span style={{fontSize:20}}>{t.icon}</span>
      <span style={{color:tab===t.id?C.gold:"#8896B3",fontSize:10,fontWeight:700}}>{t.label}</span>
    </button>)}
  </div>;
}

function HomeTab({data,setTab}){
  return <div className="fade-in" style={{padding:"16px 16px 0"}}>
    <div style={{background:`linear-gradient(135deg,${C.navy} 0%,${C.navyLight} 100%)`,borderRadius:16,padding:"20px",marginBottom:20,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-20,left:-20,width:100,height:100,background:C.gold+"22",borderRadius:"50%"}}/>
      <div style={{position:"relative"}}>
        <div style={{color:C.goldLight,fontSize:12,fontWeight:700,marginBottom:6}}>أهلاً بك في</div>
        <div style={{color:"#fff",fontSize:22,fontWeight:900,lineHeight:1.3}}>منصتك التعليمية<br/>الخاصة 🎓</div>
        <div style={{color:"#aab4cc",fontSize:13,marginTop:8}}>ملفات • شروحات مجانية • دورات متكاملة</div>
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
      {[{icon:"📄",count:data.pdfs.length,label:"ملف PDF"},{icon:"▶️",count:data.freeVideos.length,label:"شرح مجاني"},{icon:"🎯",count:data.paidVideos.length,label:"دورة مدفوعة"}].map((s,i)=>(
        <div key={i} style={{background:C.card,borderRadius:12,padding:"12px 8px",textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:24}}>{s.icon}</div>
          <div style={{color:C.navy,fontSize:22,fontWeight:900}}>{s.count}</div>
          <div style={{color:C.muted,fontSize:11}}>{s.label}</div>
        </div>
      ))}
    </div>
    <div style={{marginBottom:10}}>
      <div style={{color:C.navy,fontSize:14,fontWeight:700,marginBottom:12}}>الوصول السريع</div>
      {[{tab:"pdfs",icon:"📄",title:"الملفات والملخصات",desc:"تنزيل ملفات PDF دراسية",color:"#3B82F6"},{tab:"freeVideos",icon:"▶️",title:"الشروحات المجانية",desc:"مقاطع فيديو تعليمية مجانية",color:C.green},{tab:"paidVideos",icon:"🔒",title:"الدورات المدفوعة",desc:"محتوى متكامل باشتراك شام كاش",color:C.gold}].map(item=>(
        <div key={item.tab} onClick={()=>setTab(item.tab)} style={{background:C.card,borderRadius:12,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:14,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",borderRight:`4px solid ${item.color}`}}>
          <div style={{fontSize:28}}>{item.icon}</div>
          <div><div style={{color:C.text,fontWeight:700,fontSize:14}}>{item.title}</div><div style={{color:C.muted,fontSize:12}}>{item.desc}</div></div>
          <div style={{marginRight:"auto",color:C.muted}}>←</div>
        </div>
      ))}
    </div>
  </div>;
}

function PdfsTab({data}){
  const [search,setSearch]=React.useState("");
  const filtered=data.pdfs.filter(p=>p.title.includes(search)||p.subject.includes(search));
  return <div className="fade-in" style={{padding:"16px"}}>
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  ابحث عن ملف أو مادة..." style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,marginBottom:16,outline:"none",background:C.card}}/>
    {filtered.length===0&&<div style={{textAlign:"center",color:C.muted,marginTop:40}}>لا توجد ملفات مطابقة</div>}
    {filtered.map(pdf=>(
      <div key={pdf.id} style={{background:C.card,borderRadius:14,padding:"16px",marginBottom:12,boxShadow:"0 2px 10px rgba(0,0,0,0.07)",border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
          <div style={{background:"#EFF6FF",borderRadius:10,padding:"10px",fontSize:24,flexShrink:0}}>📄</div>
          <div style={{flex:1}}>
            <div style={{color:C.text,fontWeight:700,fontSize:14,lineHeight:1.4,marginBottom:6}}>{pdf.title}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              <Badge text={pdf.subject} color="#3B82F6"/><Badge text={pdf.size} color={C.muted}/><Badge text={pdf.date} color={C.muted}/>
            </div>
            <a href={pdf.url} style={{display:"inline-block",background:"linear-gradient(135deg,#3B82F6,#2563EB)",color:"#fff",padding:"8px 18px",borderRadius:8,fontSize:13,fontWeight:700,textDecoration:"none"}}>⬇️ تنزيل</a>
          </div>
        </div>
      </div>
    ))}
  </div>;
}

function FreeVideosTab({data}){
  const [active,setActive]=React.useState(null);
  return <div className="fade-in" style={{padding:"16px"}}>
    {active&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <button onClick={()=>setActive(null)} style={{alignSelf:"flex-end",marginLeft:16,marginBottom:12,background:C.red,border:"none",color:"#fff",borderRadius:8,padding:"8px 16px",fontWeight:700,cursor:"pointer"}}>✕ إغلاق</button>
      <iframe src={active} width="95%" height="220" allow="autoplay; fullscreen" style={{borderRadius:12,border:"none"}}/>
    </div>}
    <div style={{color:C.navy,fontSize:13,fontWeight:600,marginBottom:16,padding:"10px 12px",background:C.green+"15",borderRadius:10,borderRight:`4px solid ${C.green}`}}>✅ هذه المقاطع مجانية بالكامل للجميع</div>
    {data.freeVideos.map(v=>(
      <div key={v.id} style={{background:C.card,borderRadius:14,marginBottom:14,overflow:"hidden",boxShadow:"0 2px 10px rgba(0,0,0,0.07)"}}>
        <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setActive(v.url)}>
          <img src={v.thumb} alt={v.title} style={{width:"100%",height:160,objectFit:"cover"}}/>
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{width:52,height:52,background:C.green,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>▶</div>
          </div>
          <div style={{position:"absolute",bottom:8,left:8,background:"rgba(0,0,0,0.7)",color:"#fff",padding:"3px 8px",borderRadius:6,fontSize:11,fontWeight:600}}>⏱ {v.duration}</div>
        </div>
        <div style={{padding:"12px 14px"}}>
          <div style={{color:C.text,fontWeight:700,fontSize:14,marginBottom:6}}>{v.title}</div>
          <Badge text={v.subject} color={C.green}/>
        </div>
      </div>
    ))}
  </div>;
}

function PaidVideosTab({data}){
  const [selected,setSelected]=React.useState(null);
  const [step,setStep]=React.useState("info");
  const [enteredCode,setEnteredCode]=React.useState("");
  const [genCode,setGenCode]=React.useState("");
  const [error,setError]=React.useState("");
  const [playing,setPlaying]=React.useState(null);

  function startPurchase(v){setSelected(v);setStep("info");setEnteredCode("");setGenCode("");setError("");}
  function goToPay(){const c="HUSAM-"+Math.random().toString(36).substring(2,8).toUpperCase();setGenCode(c);setStep("pay");}
  function verify(){if(enteredCode===genCode){setStep("unlocked");setError("");}else setError("❌ الكود غير صحيح");}

  return <div className="fade-in" style={{padding:"16px"}}>
    {selected&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:C.card,borderRadius:"20px 20px 0 0",width:"100%",padding:"24px 20px 32px",maxHeight:"85vh",overflowY:"auto"}}>
        {step==="info"&&<>
          <div style={{color:C.navy,fontSize:17,fontWeight:900,marginBottom:6}}>{selected.title}</div>
          <div style={{color:C.muted,fontSize:13,marginBottom:16}}>⏱ {selected.duration} • {selected.subject}</div>
          <div style={{background:C.gold+"18",border:`1.5px solid ${C.gold}`,borderRadius:12,padding:14,marginBottom:20}}>
            <div style={{color:C.navy,fontWeight:700,fontSize:14,marginBottom:4}}>💰 سعر الدورة</div>
            <div style={{color:C.gold,fontSize:26,fontWeight:900}}>{selected.price.toLocaleString()} ل.س</div>
          </div>
          <div style={{color:C.navy,fontSize:13,fontWeight:700,marginBottom:10}}>📋 خطوات الشراء:</div>
          {["أرسل المبلغ عبر شام كاش","أرسل لقطة شاشة للمدرس على تيليغرام","انتظر تأكيد الدفع وستصلك رسالة بالكود","أدخل الكود هنا للوصول للمحتوى"].map((s,i)=>(
            <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
              <div style={{background:C.navy,color:C.gold,width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,flexShrink:0}}>{i+1}</div>
              <div style={{color:C.text,fontSize:13}}>{s}</div>
            </div>
          ))}
          <div style={{display:"flex",gap:10,marginTop:16}}>
            <button onClick={()=>setSelected(null)} style={{flex:1,padding:"12px",borderRadius:10,border:`1.5px solid ${C.border}`,background:"#fff",fontWeight:700,cursor:"pointer",color:C.muted}}>إلغاء</button>
            <button onClick={goToPay} style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.gold},#E8940A)`,fontWeight:900,cursor:"pointer",color:C.navy,fontSize:14}}>💳 الانتقال للدفع</button>
          </div>
        </>}
        {step==="pay"&&<>
          <div style={{textAlign:"center",marginBottom:16}}>
            <div style={{fontSize:48}}>📱</div>
            <div style={{color:C.navy,fontSize:17,fontWeight:900}}>ادفع عبر شام كاش</div>
          </div>
          <div style={{background:"#F0FDF4",border:`1.5px solid ${C.green}`,borderRadius:12,padding:14,marginBottom:16,textAlign:"center"}}>
            <div style={{color:C.muted,fontSize:12}}>رقم شام كاش</div>
            <div style={{color:C.navy,fontSize:22,fontWeight:900,letterSpacing:2}}>0999 123 456</div>
            <div style={{color:C.muted,fontSize:12,marginTop:4}}>باسم: حسام طارق</div>
          </div>
          <div style={{color:C.muted,fontSize:12,marginBottom:16,textAlign:"center"}}>بعد الدفع أرسل لقطة شاشة على تيليغرام:<br/><strong style={{color:C.navy}}>@husam_edu</strong></div>
          <div style={{color:C.navy,fontSize:13,fontWeight:700,marginBottom:8}}>🔑 أدخل الكود الذي أرسله لك المدرس:</div>
          <input value={enteredCode} onChange={e=>setEnteredCode(e.target.value.toUpperCase())} placeholder="HUSAM-XXXXXX" style={{width:"100%",padding:"12px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,marginBottom:6,textAlign:"center",letterSpacing:2,outline:"none"}}/>
          {error&&<div style={{color:C.red,fontSize:12,marginBottom:10}}>{error}</div>}
          <button onClick={verify} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.green},#219A52)`,fontWeight:900,cursor:"pointer",color:"#fff",fontSize:14,marginBottom:10}}>✅ تحقق من الكود</button>
          <button onClick={()=>setSelected(null)} style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:"none",color:C.muted,cursor:"pointer"}}>إغلاق</button>
        </>}
        {step==="unlocked"&&<>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:56}}>🎉</div>
            <div style={{color:C.green,fontSize:18,fontWeight:900}}>تم فتح المحتوى!</div>
            <div style={{color:C.muted,fontSize:13,marginTop:4}}>{selected.title}</div>
          </div>
          {playing===selected.id?<iframe src={selected.url} width="100%" height="200" allow="autoplay; fullscreen" style={{borderRadius:12,border:"none",marginBottom:12}}/>:
          <button onClick={()=>setPlaying(selected.id)} style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.navy},${C.navyLight})`,fontWeight:900,cursor:"pointer",color:C.gold,fontSize:15,marginBottom:12}}>▶ مشاهدة الدورة الآن</button>}
          <button onClick={()=>setSelected(null)} style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:"none",color:C.muted,cursor:"pointer"}}>إغلاق</button>
        </>}
      </div>
    </div>}
    <div style={{color:C.navy,fontSize:13,fontWeight:600,marginBottom:16,padding:"10px 12px",background:C.gold+"18",borderRadius:10,borderRight:`4px solid ${C.gold}`}}>🔒 الدفع عبر شام كاش حصراً</div>
    {data.paidVideos.map(v=>(
      <div key={v.id} style={{background:C.card,borderRadius:14,marginBottom:14,overflow:"hidden",boxShadow:"0 2px 10px rgba(0,0,0,0.07)"}}>
        <div style={{position:"relative"}}>
          <img src={v.thumb} alt={v.title} style={{width:"100%",height:160,objectFit:"cover"}}/>
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:40}}>🔒</div></div>
          <div style={{position:"absolute",top:10,right:10,background:C.gold,color:C.navy,padding:"4px 10px",borderRadius:8,fontSize:13,fontWeight:900}}>{v.price.toLocaleString()} ل.س</div>
        </div>
        <div style={{padding:"12px 14px"}}>
          <div style={{color:C.text,fontWeight:700,fontSize:14,marginBottom:6}}>{v.title}</div>
          <div style={{display:"flex",gap:8,marginBottom:12}}><Badge text={v.subject} color={C.gold}/><Badge text={`⏱ ${v.duration}`} color={C.muted}/></div>
          <button onClick={()=>startPurchase(v)} style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.gold},#E8940A)`,fontWeight:900,cursor:"pointer",color:C.navy,fontSize:14}}>💳 اشترِ الآن</button>
        </div>
      </div>
    ))}
  </div>;
}

function AdminTab({data,setData}){
  const [sec,setSec]=React.useState("pdfs");
  const [form,setForm]=React.useState({});
  const [msg,setMsg]=React.useState("");
  function add(){if(!form.title){setMsg("⚠️ أضف عنواناً");return;}setData(p=>({...p,[sec]:[...p[sec],{id:Date.now(),...form}]}));setForm({});setMsg("✅ تم الإضافة!");setTimeout(()=>setMsg(""),3000);}
  function del(id){setData(p=>({...p,[sec]:p[sec].filter(i=>i.id!==id)}))}
  const sections=[{id:"pdfs",label:"📄 الملفات"},{id:"freeVideos",label:"▶️ مجاني"},{id:"paidVideos",label:"🔒 مدفوع"}];
  const fields={pdfs:[{key:"title",label:"العنوان",type:"text"},{key:"subject",label:"المادة",type:"text"},{key:"size",label:"الحجم",type:"text"},{key:"url",label:"رابط الملف",type:"url"},{key:"date",label:"التاريخ",type:"date"}],freeVideos:[{key:"title",label:"العنوان",type:"text"},{key:"subject",label:"المادة",type:"text"},{key:"duration",label:"المدة",type:"text"},{key:"url",label:"رابط يوتيوب Embed",type:"url"},{key:"thumb",label:"صورة مصغرة",type:"url"}],paidVideos:[{key:"title",label:"العنوان",type:"text"},{key:"subject",label:"المادة",type:"text"},{key:"price",label:"السعر ل.س",type:"number"},{key:"duration",label:"المدة",type:"text"},{key:"url",label:"رابط يوتيوب Embed",type:"url"},{key:"thumb",label:"صورة مصغرة",type:"url"}]};
  return <div className="fade-in" style={{padding:"16px"}}>
    <div style={{display:"flex",gap:8,marginBottom:20,background:"#E8EDF5",borderRadius:12,padding:4}}>
      {sections.map(s=><button key={s.id} onClick={()=>setSec(s.id)} style={{flex:1,padding:"8px 4px",borderRadius:10,border:"none",background:sec===s.id?C.navy:"none",color:sec===s.id?C.gold:C.muted,fontSize:11,fontWeight:700,cursor:"pointer"}}>{s.label}</button>)}
    </div>
    <div style={{background:C.card,borderRadius:14,padding:16,marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
      <div style={{color:C.navy,fontWeight:700,fontSize:14,marginBottom:14}}>➕ إضافة جديد</div>
      {fields[sec].map(f=><div key={f.key} style={{marginBottom:10}}>
        <label style={{color:C.muted,fontSize:12,display:"block",marginBottom:4}}>{f.label}</label>
        <input type={f.type} value={form[f.key]||""} onChange={e=>setForm(p=>({...p,[f.key]:f.type==="number"?+e.target.value:e.target.value}))} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:13,outline:"none"}}/>
      </div>)}
      {msg&&<div style={{color:msg.startsWith("✅")?C.green:C.red,fontSize:12,marginBottom:8}}>{msg}</div>}
      <button onClick={add} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.navy},${C.navyLight})`,fontWeight:900,cursor:"pointer",color:C.gold,fontSize:14}}>✅ حفظ</button>
    </div>
    <div style={{color:C.navy,fontWeight:700,fontSize:13,marginBottom:10}}>📋 العناصر ({data[sec].length})</div>
    {data[sec].map(item=><div key={item.id} style={{background:C.card,borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
      <div style={{color:C.text,fontSize:13,fontWeight:600,flex:1}}>{item.title}</div>
      <button onClick={()=>del(item.id)} style={{background:"#FEE2E2",border:"none",color:C.red,padding:"6px 10px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12,marginRight:8}}>🗑 حذف</button>
    </div>)}
  </div>;
}

function LoginModal({onClose,onSuccess}){
  const [pass,setPass]=React.useState("");
  const [err,setErr]=React.useState("");
  function check(){if(pass===ADMIN_PASS){onSuccess();onClose();}else setErr("كلمة المرور غير صحيحة");}
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{background:C.card,borderRadius:20,padding:24,width:"100%",maxWidth:340}}>
      <div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:40}}>🔐</div><div style={{color:C.navy,fontSize:18,fontWeight:900}}>دخول الإدارة</div></div>
      <input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&check()} placeholder="كلمة المرور" style={{width:"100%",padding:"12px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,marginBottom:8,textAlign:"center",outline:"none"}}/>
      {err&&<div style={{color:C.red,fontSize:12,marginBottom:8,textAlign:"center"}}>{err}</div>}
      <button onClick={check} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.navy},${C.navyLight})`,fontWeight:900,color:C.gold,cursor:"pointer",marginBottom:10}}>دخول</button>
      <button onClick={onClose} style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:"none",color:C.muted,cursor:"pointer"}}>إلغاء</button>
    </div>
  </div>;
}

function App(){
  const [tab,setTab]=React.useState("home");
  const [data,setData]=React.useState(initialData);
  const [isAdmin,setIsAdmin]=React.useState(false);
  const [showLogin,setShowLogin]=React.useState(false);
  function toggleAdmin(){if(isAdmin){setIsAdmin(false);if(tab==="admin")setTab("home");}else setShowLogin(true);}
  return <>
    {showLogin&&<LoginModal onClose={()=>setShowLogin(false)} onSuccess={()=>setIsAdmin(true)}/>}
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:C.bg}}>
      <Header tab={tab} isAdmin={isAdmin} onAdminToggle={toggleAdmin}/>
      <div style={{paddingBottom:80}}>
        {tab==="home"&&<HomeTab data={data} setTab={setTab}/>}
        {tab==="pdfs"&&<PdfsTab data={data}/>}
        {tab==="freeVideos"&&<FreeVideosTab data={data}/>}
        {tab==="paidVideos"&&<PaidVideosTab data={data}/>}
        {tab==="admin"&&isAdmin&&<AdminTab data={data} setData={setData}/>}
      </div>
      <BottomNav tab={tab} setTab={setTab} isAdmin={isAdmin}/>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
