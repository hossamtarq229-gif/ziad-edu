// ─── JSONbin API ──────────────────────────────────────────────────────────────
async function createBin(data) {
  const res = await fetch("https://api.jsonbin.io/v3/b", {
    method: "POST",
    headers: {"Content-Type":"application/json","X-Master-Key":MASTER_KEY,"X-Bin-Name":"ziad-edu"},
    body: JSON.stringify(data)
  });
  const json = await res.json();
  return json.metadata?.id || null;
}

async function readBin(binId) {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
    headers: {"X-Master-Key": MASTER_KEY}
  });
  const json = await res.json();
  return json.record || null;
}

async function updateBin(binId, data) {
  await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
    method: "PUT",
    headers: {"Content-Type":"application/json","X-Master-Key":MASTER_KEY},
    body: JSON.stringify(data)
  });
}

// ─── ADMIN ────────────────────────────────────────────────────────────────────
function AdminTab({data,setData,binId,setBinId,saving,setSaving}){
  const [sec,setSec]=React.useState("pdfs");
  const [form,setForm]=React.useState({});
  const [msg,setMsg]=React.useState("");

  async function saveToCloud(newData){
    setSaving(true);
    try {
      if(binId){
        await updateBin(binId,newData);
      } else {
        const id = await createBin(newData);
        if(id){ setBinId(id); localStorage.setItem("ziad_bin_id",id); }
      }
      setMsg("✅ تم الحفظ وظهر للطلاب!");
    } catch(e){ setMsg("⚠️ خطأ في الحفظ، تحقق من الاتصال"); }
    setSaving(false);
    setTimeout(()=>setMsg(""),3000);
  }

  async function add(){
    if(!form.title){setMsg("⚠️ أضف عنواناً");return;}
    const newItem={id:Date.now(),...form};
    const newData={...data,[sec]:[...data[sec],newItem]};
    setData(newData);
    setForm({});
    await saveToCloud(newData);
  }

  async function del(id){
    const newData={...data,[sec]:data[sec].filter(i=>i.id!==id)};
    setData(newData);
    await saveToCloud(newData);
  }

  const sections=[{id:"pdfs",label:"📄 الملفات"},{id:"freeVideos",label:"▶️ مجاني"},{id:"paidVideos",label:"🔒 مدفوع"}];
  const fields={
    pdfs:[{key:"title",label:"العنوان",type:"text"},{key:"subject",label:"المادة",type:"text"},{key:"size",label:"الحجم (مثل: 2.3 MB)",type:"text"},{key:"url",label:"رابط الملف",type:"url"},{key:"date",label:"التاريخ",type:"date"}],
    freeVideos:[{key:"title",label:"العنوان",type:"text"},{key:"subject",label:"المادة",type:"text"},{key:"duration",label:"المدة (مثل: 20 دقيقة)",type:"text"},{key:"url",label:"رابط يوتيوب Embed",type:"url"},{key:"thumb",label:"صورة مصغرة (اختياري)",type:"url"}],
    paidVideos:[{key:"title",label:"العنوان",type:"text"},{key:"subject",label:"المادة",type:"text"},{key:"price",label:"السعر بالليرة",type:"number"},{key:"duration",label:"المدة",type:"text"},{key:"url",label:"رابط يوتيوب Embed",type:"url"},{key:"thumb",label:"صورة مصغرة (اختياري)",type:"url"}]
  };

  return <div className="fade-in" style={{padding:"16px"}}>
    {binId&&<div style={{background:"#F0FDF4",border:`1px solid ${C.green}`,borderRadius:10,padding:"10px 12px",marginBottom:16,fontSize:12,color:C.green,fontWeight:600}}>
      🟢 متصل بالسحابة — أي تعديل يظهر فوراً للطلاب
    </div>}
    {!binId&&<div style={{background:"#FFF7ED",border:`1px solid ${C.gold}`,borderRadius:10,padding:"10px 12px",marginBottom:16,fontSize:12,color:"#92400E",fontWeight:600}}>
      ⚠️ عند أول إضافة سيتم إنشاء قاعدة البيانات تلقائياً
    </div>}
    {saving&&<div style={{background:C.navy,color:C.gold,borderRadius:10,padding:"10px 12px",marginBottom:16,fontSize:13,fontWeight:700,textAlign:"center"}}>
      <span className="spin">⏳</span> جاري الحفظ...
    </div>}

    <div style={{display:"flex",gap:8,marginBottom:20,background:"#E8EDF5",borderRadius:12,padding:4}}>
      {sections.map(s=><button key={s.id} onClick={()=>setSec(s.id)} style={{flex:1,padding:"8px 4px",borderRadius:10,border:"none",background:sec===s.id?C.navy:"none",color:sec===s.id?C.gold:C.muted,fontSize:11,fontWeight:700,cursor:"pointer"}}>{s.label}</button>)}
    </div>

    <div style={{background:C.card,borderRadius:14,padding:16,marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
      <div style={{color:C.navy,fontWeight:700,fontSize:14,marginBottom:14}}>➕ إضافة جديد</div>
      {fields[sec].map(f=><div key={f.key} style={{marginBottom:10}}>
        <label style={{color:C.muted,fontSize:12,display:"block",marginBottom:4}}>{f.label}</label>
        <input type={f.type} value={form[f.key]||""} onChange={e=>setForm(p=>({...p,[f.key]:f.type==="number"?+e.target.value:e.target.value}))} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${C.border}`,fontSize:13,outline:"none"}}/>
      </div>)}
      {msg&&<div style={{color:msg.startsWith("✅")?C.green:C.red,fontSize:12,marginBottom:8}}>{msg}</div>}
      <button onClick={add} disabled={saving} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:saving?"#ccc":`linear-gradient(135deg,${C.navy},${C.navyLight})`,fontWeight:900,cursor:saving?"not-allowed":"pointer",color:C.gold,fontSize:14}}>
        {saving?"جاري الحفظ...":"✅ إضافة وحفظ"}
      </button>
    </div>

    <div style={{color:C.navy,fontWeight:700,fontSize:13,marginBottom:10}}>📋 العناصر ({data[sec].length})</div>
    {data[sec].length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:13,padding:20}}>لا توجد عناصر بعد</div>}
    {data[sec].map(item=><div key={item.id} style={{background:C.card,borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
      <div style={{color:C.text,fontSize:13,fontWeight:600,flex:1}}>{item.title}</div>
      <button onClick={()=>del(item.id)} disabled={saving} style={{background:"#FEE2E2",border:"none",color:C.red,padding:"6px 10px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12,marginRight:8}}>🗑</button>
    </div>)}
  </div>;
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginModal({onClose,onSuccess}){
  const [pass,setPass]=React.useState("");
  const [err,setErr]=React.useState("");
  function check(){if(pass===ADMIN_PASS){onSuccess();onClose();}else setErr("كلمة المرور غير صحيحة");}
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{background:C.card,borderRadius:20,padding:24,width:"100%",maxWidth:340}}>
      <div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:40}}>🔐</div><div style={{color:C.navy,fontSize:18,fontWeight:900}}>دخول الإدارة</div></div>
      <input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&check()} placeholder="كلمة المرور" style={{width:"100%",padding:"12px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,marginBottom:8,textAlign:"center",outline:"none"}}/>
      {err&&<div style={{color:C.red,fontSize:12,marginBottom:8,textAlign:"center"}}>{err}</div>}
      <button onClick={check} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.navy},${C.navyLight})`,fontWeight:900,color:C.gold,cursor:"pointer",marginBottom:10}}>دخول</button>
      <button onClick={onClose} style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:"none",color:C.muted,cursor:"pointer"}}>إلغاء</button>
    </div>
  </div>;
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=React.useState("home");
  const [data,setData]=React.useState(emptyData);
  const [isAdmin,setIsAdmin]=React.useState(false);
  const [showLogin,setShowLogin]=React.useState(false);
  const [binId,setBinId]=React.useState(()=>localStorage.getItem("ziad_bin_id")||null);
  const [loading,setLoading]=React.useState(true);
  const [saving,setSaving]=React.useState(false);

  React.useEffect(()=>{
    async function load(){
      setLoading(true);
      if(binId){
        try{ const d=await readBin(binId); if(d)setData(d); }catch(e){}
      }
      setLoading(false);
    }
    load();
  },[binId]);

  function toggleAdmin(){
    if(isAdmin){setIsAdmin(false);if(tab==="admin")setTab("home");}
    else setShowLogin(true);
  }

  return <>
    {showLogin&&<LoginModal onClose={()=>setShowLogin(false)} onSuccess={()=>setIsAdmin(true)}/>}
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:C.bg}}>
      <Header tab={tab} isAdmin={isAdmin} onAdminToggle={toggleAdmin}/>
      <div style={{paddingBottom:80}}>
        {loading?<Loader/>:<>
          {tab==="home"&&<HomeTab data={data} setTab={setTab}/>}
          {tab==="pdfs"&&<PdfsTab data={data}/>}
          {tab==="freeVideos"&&<FreeVideosTab data={data}/>}
          {tab==="paidVideos"&&<PaidVideosTab data={data}/>}
          {tab==="admin"&&isAdmin&&<AdminTab data={data} setData={setData} binId={binId} setBinId={setBinId} saving={saving} setSaving={setSaving}/>}
        </>}
      </div>
      <BottomNav tab={tab} setTab={setTab} isAdmin={isAdmin}/>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
